server:
  port: 8080


spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    hikari:
      maximum-pool-size: 12
      minimum-idle: 4
      connection-timeout: 30000
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${DB_USERNAME:CAFE_APP}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  auth:
    session-hours: 2
    default-admin-username: ${DEFAULT_ADMIN_USERNAME:admin}
    default-admin-password: ${DEFAULT_ADMIN_PASSWORD:admin123}
    default-admin-email: ${DEFAULT_ADMIN_EMAIL:admin@phungloc.local}
    password-reset:
      code-minutes: ${PASSWORD_RESET_CODE_MINUTES:10}
      max-attempts: ${PASSWORD_RESET_MAX_ATTEMPTS:5}
      return-code-in-response: ${PASSWORD_RESET_RETURN_CODE:false}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@phungloc.local}}

payos:
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  return-url: ${PAYOS_RETURN_URL:http:}
  cancel-url: ${PAYOS_CANCEL_URL:http:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:coffee-chain/products}
